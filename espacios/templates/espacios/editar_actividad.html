<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Editar actividad</title>

    <style>

        body {

            font-family: Arial, sans-serif;
            background-color: #f4f5f7;
            padding: 40px;

        }

        .contenedor {

            background: white;
            width: 500px;
            margin: auto;
            padding: 30px;
            border-radius: 10px;

        }

        input,
        textarea,
        select {

            width: 100%;
            padding: 10px;
            margin-bottom: 15px;

        }

        button {

            background: #172b4d;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;

        }

        .archivo-item {

            background: #f4f5f7;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;

        }

    </style>

</head>

<body>

    <div class="contenedor">

        <h2>Editar actividad</h2>

        <form method="POST">

            {% csrf_token %}

            <input
                type="text"
                name="titulo_actividad"
                value="{{ actividad.titulo_actividad }}"
            >

            <textarea
                name="descripcion_actividad"
            >{{ actividad.descripcion_detallada }}</textarea>

            <select name="prioridad_actividad">

                <option value="BAJA">Baja</option>

                <option value="MEDIA">Media</option>

                <option value="ALTA">Alta</option>

                <option value="URGENTE">Urgente</option>

            </select>

            <label>

                Fecha límite

            </label>

            <input
                type="date"
                name="fecha_limite"
                value="{{ actividad.fecha_limite|date:'Y-m-d' }}"
            >

            <button type="submit">

                Guardar cambios

            </button>

        </form>

        <hr style="margin-top: 30px; margin-bottom: 30px;">

        <h3>Subir archivo adjunto</h3>

        <form
            method="POST"
            enctype="multipart/form-data"
            action="/subir-archivo/{{ actividad.id }}/"
        >

            {% csrf_token %}

            <input
                type="file"
                name="archivo_adjunto"
                required
            >

            <button type="submit">

                Subir archivo

            </button>

        </form>

        <hr style="margin-top: 30px; margin-bottom: 30px;">

        <h3>Archivos adjuntos</h3>

        {% for archivo in actividad.archivos_adjuntos.all %}

            <div class="archivo-item">

                <a
                    href="{{ archivo.archivo.url }}"
                    target="_blank"
                >

                    {{ archivo.archivo.name }}

                </a>

                <br>

                <small>

                    Subido por:
                    {{ archivo.usuario_subida }}

                </small>

            </div>

        {% empty %}

            <p>No hay archivos adjuntos.</p>

        {% endfor %}

    </div>

</body>

</html>
