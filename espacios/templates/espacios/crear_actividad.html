<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Actividad - Gestión de Tareas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #f0f0f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .page-wrapper {
            max-width: 600px;
            margin: 0 auto;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #555;
            text-decoration: none;
            margin-bottom: 20px;
            transition: color 0.2s;
        }

        .back-link:hover { color: #000; text-decoration: none; }

        .form-card {
            background: white;
            border: 1px solid #ddd;
            border-radius: 6px;
            overflow: hidden;
        }

        .form-card-header {
            background: #000;
            color: white;
            padding: 22px 28px;
            border-bottom: 2px solid #222;
        }

        .form-card-header h2 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .form-card-header p {
            font-size: 13px;
            color: #aaa;
        }

        .form-card-body {
            padding: 28px;
        }

        .form-field {
            margin-bottom: 20px;
        }

        .form-field label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: #444;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-field input,
        .form-field textarea,
        .form-field select {
            width: 100%;
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 10px 13px;
            font-size: 14px;
            font-family: inherit;
            color: #000;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-field input:focus,
        .form-field textarea:focus,
        .form-field select:focus {
            border-color: #000;
            outline: none;
            box-shadow: 0 0 0 3px rgba(0,0,0,0.07);
        }

        .form-field textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .divider {
            border: none;
            border-top: 1px solid #eee;
            margin: 24px 0;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn-submit {
            background: #000;
            color: white;
            border: none;
            padding: 11px 24px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 7px;
        }

        .btn-submit:hover { background: #333; }

        .btn-cancel {
            background: transparent;
            color: #666;
            border: 1px solid #ccc;
            padding: 11px 20px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-cancel:hover {
            border-color: #000;
            color: #000;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="page-wrapper">

        <a href="/" class="back-link">
            <i class="fas fa-arrow-left"></i> Volver al Dashboard
        </a>

        <div class="form-card">
            <div class="form-card-header">
                <h2><i class="fas fa-plus-circle"></i> Crear Nueva Actividad</h2>
                <p>Completa los datos para agregar una tarea al tablero</p>
            </div>

            <div class="form-card-body">
                <form method="POST">
                    {% csrf_token %}

                    <div class="form-field">
                        <label>Título de la actividad *</label>
                        <input type="text" name="titulo_actividad" placeholder="Ej: Diseñar pantalla de login" required>
                    </div>

                    <div class="form-field">
                        <label>Descripción</label>
                        <textarea name="descripcion_actividad" placeholder="Describe los detalles de esta actividad..."></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-field">
                            <label>Prioridad</label>
                            <select name="prioridad_actividad">
                                <option value="BAJA">🟢 Baja</option>
                                <option value="MEDIA" selected>🟡 Media</option>
                                <option value="ALTA">🔴 Alta</option>
                                <option value="URGENTE">🚨 Urgente</option>
                            </select>
                        </div>

                        <div class="form-field">
                            <label>Fecha Límite</label>
                            <input type="date" name="fecha_limite">
                        </div>
                    </div>

                    <hr class="divider">

                    <div class="form-actions">
                        <button type="submit" class="btn-submit">
                            <i class="fas fa-plus"></i> Crear Actividad
                        </button>
                        <a href="/" class="btn-cancel">
                            Cancelar
                        </a>
                    </div>

                </form>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
