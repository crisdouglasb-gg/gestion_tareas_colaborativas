<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Ingreso al Sistema</title>

    <style>

        body {

            font-family: Arial, sans-serif;
            background-color: #f4f5f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;

        }

        .contenedor-login {

            background-color: white;
            padding: 40px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.1);

        }

        h1 {

            text-align: center;
            color: #172b4d;
            margin-bottom: 30px;

        }

        label {

            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
            font-weight: bold;

        }

        input {

            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;

        }

        button {

            width: 100%;
            margin-top: 25px;
            padding: 12px;
            border: none;
            background-color: #0052cc;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;

        }

        button:hover {

            background-color: #0747a6;

        }

        .mensaje-error {

            color: red;
            margin-top: 15px;
            text-align: center;

        }

    </style>

</head>

<body>

    <div class="contenedor-login">

        <h1>Ingreso al Sistema</h1>

        <form method="POST">

            {% csrf_token %}

            <label>Usuario</label>

            <input type="text"
                   name="username">

            <label>Contraseña</label>

            <input type="password"
                   name="password">

            <button type="submit">

                Ingresar al Panel

            </button>

        </form>

        {% if form.errors %}

            <div class="mensaje-error">

                Usuario o contraseña incorrectos.

            </div>

        {% endif %}

    </div>

</body>

</html>
