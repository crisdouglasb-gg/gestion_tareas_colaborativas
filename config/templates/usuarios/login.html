<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Login Sistema Kanban</title>

    <style>

        body {

            font-family: Arial, sans-serif;
            background-color: #f4f5f7;

            display: flex;
            justify-content: center;
            align-items: center;

            height: 100vh;
            margin: 0;

        }

        .contenedor-login {

            background-color: white;

            padding: 40px;

            border-radius: 10px;

            width: 350px;

            box-shadow: 0px 2px 8px rgba(0,0,0,0.1);

        }

        h1 {

            color: #172b4d;
            margin-bottom: 30px;
            text-align: center;

        }

        input {

            width: 100%;

            padding: 10px;

            margin-bottom: 15px;

            border-radius: 5px;

            border: 1px solid #ccc;

        }

        button {

            width: 100%;

            padding: 12px;

            border: none;

            border-radius: 5px;

            background-color: #0052cc;

            color: white;

            font-size: 16px;

            cursor: pointer;

        }

        button:hover {

            background-color: #0747a6;

        }

        .error {

            color: red;

            margin-bottom: 15px;

        }

    </style>

</head>

<body>

    <div class="contenedor-login">

        <h1>Ingreso al Sistema</h1>

        {% if form.errors %}

            <div class="error">

                Usuario o contraseña incorrectos.

            </div>

        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <input
                type="text"
                name="username"
                placeholder="Usuario"
            >

            <input
                type="password"
                name="password"
                placeholder="Contraseña"
            >

            <button type="submit">

                Ingresar

            </button>

        </form>

    </div>

</body>

</html>
